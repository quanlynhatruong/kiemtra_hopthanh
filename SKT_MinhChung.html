<style>
  #upload_modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 10005; justify-content: center; align-items: center; }
  .up-container { background: white; padding: 20px; border-radius: 12px; width: 600px; max-width: 95%; box-shadow: 0 5px 20px rgba(0,0,0,0.3); font-family: "Times New Roman"; }
  .up-header { text-align: center; border-bottom: 2px solid #1e3a8a; margin-bottom: 15px; padding-bottom: 5px; }
  .up-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
  .up-dropzone { border: 2px dashed #3b82f6; padding: 25px; text-align: center; background: white; border-radius: 8px; cursor: pointer; transition: 0.2s; }
  .up-dropzone:hover { background: #eff6ff; }
  #uploadBtn { width: 100%; padding: 12px; background: #059669; color: white; border: none; font-weight: bold; border-radius: 6px; cursor: pointer; opacity: 0.5; pointer-events: none; margin-top: 10px; }
  #uploadBtn.active { opacity: 1; pointer-events: auto; }
  .close-up { background: #ef4444; color: white; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; float: right; }
  #warnDelete { display:none; color:#d97706; font-size:13px; text-align:center; margin-bottom:5px; font-weight:bold; background: #fffbeb; padding: 5px; border-radius: 4px; border: 1px dashed #d97706; }
</style>

<div id="upload_modal">
  <div class="up-container">
    <div class="up-header"><h2 style="margin:0; color:#1e3a8a;">📁 MINH CHỨNG</h2></div>
    <div class="up-box">
      <label><b>1. Chọn thư mục lưu trữ (Tiêu chuẩn):</b></label>
      <select id="folderSelect" style="width:100%; padding:8px; margin-top:5px; border:1px solid #ccc; border-radius:4px;"><option>⏳ Đang quét...</option></select>
    </div>
    <div class="up-box">
      <label style="display:block; margin-bottom:5px;"><b>2. Chọn chế độ và phương thức tải:</b></label>
      <div style="display:flex; gap:20px; justify-content:center; margin-bottom:10px; font-weight:bold;">
        <label><input type="radio" name="upMode" value="file" checked onchange="doi_cd_tep()"> 📄 Chọn nhiều File lẻ</label>
        <label><input type="radio" name="upMode" value="folder" onchange="doi_cd_tm()"> 📂 Cả thư mục</label>
      </div>
      <div style="display:flex; gap:20px; justify-content:center; padding:8px; background:#e0f2fe; border-radius:6px; margin-bottom:10px; font-size: 14px;">
        <label style="color:#0369a1; cursor:pointer;" title="Xóa tài liệu cũ trên hệ thống, thay bằng tài liệu mới"><input type="radio" name="writeMode" value="replace" checked onchange="cn_canhbao()"> 🔄 Thay thế tài liệu cũ</label>
        <label style="color:#0369a1; cursor:pointer;" title="Giữ nguyên tài liệu cũ, chèn thêm tài liệu mới vào hệ thống"><input type="radio" name="writeMode" value="append" onchange="cn_canhbao()"> ➕ Chèn thêm tài liệu</label>
      </div>
      <div class="up-dropzone" onclick="document.getElementById('fileIn').click()">
        <span id="fileLabel">Nhấn vào đây để chọn file</span>
        <input type="file" id="fileIn" style="display:none" onchange="chon_tep(this)" multiple>
      </div>
    </div>
    <div id="warnDelete">⚠️ Tài liệu cũ (File/Thư mục) trên Drive sẽ bị xóa vĩnh viễn để thay thế bằng tài liệu mới.</div>
    <div id="upStatus" style="text-align:center; font-weight:bold; min-height:20px; color:#333;"></div>
    <div style="margin-top:10px;">
      <button id="uploadBtn" onclick="thuc_tai()">BẮT ĐẦU TẢI LÊN</button>
      <button class="close-up" onclick="dong_hop_tai()">ĐÓNG</button>
      <div style="clear:both"></div>
    </div>
  </div>
</div>

<script>
  let tep_ht = []; let lk_xoa = ""; const id_goc = '1_Z4ipFI-LQCJ33FSyb4zzURg6KINvWgG';

  function tai_tm() {
    const s = document.getElementById('folderSelect');
    google.script.run.withSuccessHandler(fs => {
      s.innerHTML = `<option value="${id_goc}">-- Thư mục gốc --</option>`;
      if(fs) fs.forEach(f => s.add(new Option("📂 " + f.name, f.id)));
    }).lay_tmu();
  }

  function mo_hop_tai(lkh) {
    const cn = document.getElementById('cbNguoiKiemTra');
    if (cn) { const nk = cn.value; if (!nk) return typeof hien_hop === 'function' ? hien_hop("⚠️ Chọn Người kiểm tra trước!") : alert("Lỗi chọn"); }
    lk_xoa = lkh || ""; cn_canhbao(); document.getElementById('upload_modal').style.display = 'flex';
  }

  function cn_canhbao() {
    const wmd = document.querySelector('input[name="writeMode"]:checked').value; const wdv = document.getElementById('warnDelete');
    if(wmd === 'replace' && lk_xoa && lk_xoa.trim() !== "") wdv.style.display = 'block'; else wdv.style.display = 'none';
  }

  function dong_hop_tai() {
    document.getElementById('upload_modal').style.display = 'none'; document.getElementById('upStatus').innerText = "";
    document.getElementById('fileIn').value = ""; document.getElementById('fileLabel').innerText = "Nhấn để chọn file";
    document.getElementById('warnDelete').style.display = 'none'; tep_ht = []; lk_xoa = ""; document.getElementById('uploadBtn').classList.remove('active');
  }

  function doi_cd_tep() { const ip = document.getElementById('fileIn'); ip.removeAttribute('webkitdirectory'); ip.removeAttribute('directory'); ip.setAttribute('multiple', 'multiple'); dat_lai_nhap(); }
  function doi_cd_tm() { const ip = document.getElementById('fileIn'); ip.setAttribute('webkitdirectory', ''); ip.setAttribute('directory', ''); ip.setAttribute('multiple', 'multiple'); dat_lai_nhap(); }
  function dat_lai_nhap() { document.getElementById('fileIn').value = ""; document.getElementById('fileLabel').innerText = "Nhấn vào đây để chọn file"; document.getElementById('uploadBtn').classList.remove('active'); tep_ht = []; }

  function chon_tep(ip) {
    if (ip.files.length > 0) {
      tep_ht = ip.files; const md = document.querySelector('input[name="upMode"]:checked').value;
      if (md === 'folder') document.getElementById('fileLabel').innerText = `📂 ${tep_ht[0].webkitRelativePath.split('/')[0]} (${tep_ht.length} files)`;
      else document.getElementById('fileLabel').innerText = (tep_ht.length === 1) ? "📄 " + tep_ht[0].name : `📄 Đã chọn ${tep_ht.length} file`;
      document.getElementById('uploadBtn').classList.add('active'); document.getElementById('upStatus').innerText = "Sẵn sàng.";
    }
  }

  function thuc_tai() {
    if (!tep_ht || tep_ht.length === 0) return;
    const btn = document.getElementById('uploadBtn'), st = document.getElementById('upStatus');
    const fid = document.getElementById('folderSelect').value || id_goc;
    const md = document.querySelector('input[name="upMode"]:checked').value; const wmd = document.querySelector('input[name="writeMode"]:checked').value;
    
    let mhs = "";
    if (typeof dong_tai !== 'undefined' && dong_tai) { const cl = dong_tai.querySelector('.ma-ho-so-cell'); if (cl) mhs = cl.innerText; } 
    else { const mcl = document.querySelector('.ma-ho-so-cell'); mhs = mcl ? mcl.innerText : ""; }

    if (!mhs || mhs.trim() === "") { st.style.color = "red"; st.innerText = "❌ Lỗi: Không tìm thấy Mã hồ sơ!"; btn.classList.add('active'); return; }

    btn.classList.remove('active'); st.style.color = "blue"; st.innerText = "⏳ Đang xử lý tải lên...";

    if (md === 'file') {
      let fdt = []; let cnt = 0; st.innerText = `⏳ Đang đọc ${tep_ht.length} file...`;
      Array.from(tep_ht).forEach(f => {
        const rd = new FileReader();
        rd.onload = e => {
          fdt.push({ fileName: f.name, mimeType: f.type, data: e.target.result.split(',')[1] }); cnt++;
          if (cnt === tep_ht.length) {
            st.innerText = `⏳ Đang gửi ${tep_ht.length} file...`;
            google.script.run.withSuccessHandler(r => xly_kq_tai(r, st, btn)).withFailureHandler(er => { st.style.color = "red"; st.innerText = "❌ Lỗi mạng: " + er.message; btn.classList.add('active'); }).tai_tep(fdt, mhs, fid, lk_xoa, wmd); 
          }
        }; rd.readAsDataURL(f);
      });
    } else {
      const fn = tep_ht[0].webkitRelativePath.split('/')[0]; let fdt = []; let cnt = 0; st.innerText = `⏳ Đang đọc ${tep_ht.length} file...`;
      Array.from(tep_ht).forEach(f => {
        const rd = new FileReader();
        rd.onload = e => {
          fdt.push({ fileName: f.name, mimeType: f.type, data: e.target.result.split(',')[1] }); cnt++;
          if (cnt === tep_ht.length) {
            st.innerText = "⏳ Đang gửi dữ liệu...";
            google.script.run.withSuccessHandler(r => xly_kq_tai(r, st, btn)).withFailureHandler(er => { st.style.color = "red"; st.innerText = "❌ Lỗi mạng: " + er.message; btn.classList.add('active'); }).tai_tmu(fid, fn, fdt, lk_xoa, wmd); 
          }
        }; rd.readAsDataURL(f);
      });
    }
  }

  function xly_kq_tai(rs, st, btn) {
    if (rs.success) { st.style.color = "green"; st.innerText = "✅ " + rs.message; if(typeof tra_lk_chinh === 'function') tra_lk_chinh(rs.fileUrl); setTimeout(dong_hop_tai, 1000); } 
    else { st.style.color = "red"; st.innerText = "❌ " + rs.message; btn.classList.add('active'); }
  }
</script>
